<div class="dashboard">

  <!-- MÉTRICAS -->
  <div class="cards">
    <div class="card" *ngFor="let m of metrics">
      <h4>{{ m.title }}</h4>
      <p>{{ m.value }}</p>
    </div>
  </div>

  <!-- GRÁFICAS -->
  <div class="charts">

    <!-- CLIENTES -->
    <div class="chart-card" [class.low-mode]="showLow">

      <div class="chart-header">
        <h3>
          {{ showLow ? 'Clientes con bajo consumo' : 'Top Clientes' }}
        </h3>

        <button (click)="toggleClients()">
          {{ showLow ? 'Ver Top' : 'Ver bajos' }}
        </button>
      </div>

      <canvas baseChart
        [data]="clientData"
        [options]="topClientsOptions"
        chartType="bar">
      </canvas>

    </div>

    <!-- FACTURADO VS COBRADO -->
    <div class="chart-card">

      <div class="chart-header">
        <h3>Facturación vs Cobranza</h3>
      </div>

      <canvas baseChart
        [data]="billingData"
        [options]="billingOptions"
        chartType="line">
      </canvas>

    </div>

  </div>

</div>
